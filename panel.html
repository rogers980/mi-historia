<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel de Negocio — Multiservice Guro</title>
<meta name="robots" content="noindex, nofollow">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">

<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='11' y='0' fill='%23ffcc00'/%3E%3Crect width='32' height='11' y='11' fill='%230033a0'/%3E%3Crect width='32' height='10' y='22' fill='%23cf142b'/%3E%3Ctext x='16' y='16.5' font-size='7' text-anchor='middle' dominant-baseline='middle' fill='white'%3E%E2%98%85%3C/text%3E%3C/svg%3E">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,600&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="panel.css">
</head>
<body>

<div class="bandera-ribbon"><span></span><span></span><span></span></div>

<!-- PANTALLA DE LOGIN -->
<section id="pantalla-login" class="pantalla-login">
  <form id="form-login" class="tarjeta-login">
    <p class="login-eyebrow">Multiservice Guro</p>
    <h1>Panel de Negocio</h1>
    <p class="login-sub">Acceso solo para personal autorizado</p>

    <div class="selector-rol">
      <button type="button" class="rol-btn activo" data-rol="admin">Administrador</button>
      <button type="button" class="rol-btn" data-rol="agente">Agente</button>
    </div>

    <label for="usuario">Usuario</label>
    <input type="text" id="usuario" autocomplete="off" required>

    <label for="clave">Contraseña</label>
    <input type="password" id="clave" autocomplete="off" required>

    <p id="error-login" class="error-login"></p>

    <button type="submit" class="btn-entrar">Entrar</button>
  </form>
</section>

<p class="nota-pie">Datos de ejemplo</p>

<script src="panel.js?v=2"></script>
</body>
</html>
